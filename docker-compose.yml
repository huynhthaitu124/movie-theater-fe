version: '3.8'

services:
  frontend:
    container_name: movietheater-frontend
    build:
      context: .
      dockerfile: Dockerfile
    image: movietheater-frontend:latest
    ports:
      - "5173:5173"
      - "5330:5173"
    restart: unless-stopped
    environment:
      # Environment variables from .env will be passed here
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
      - VITE_GOOGLE_SCOPES=${VITE_GOOGLE_SCOPES}
      - VITE_API_URL=http://localhost:5250
    volumes:
      # For development - comment these out for production
      # - ./src:/app/src
      # - ./public:/app/public
      # Mount custom nginx config if needed
      # - ./nginx.conf:/etc/nginx/conf.d/default.conf
      []
